# Google Drive file/folder IDs for cross-device data access.
#
# HOW TO GET A FILE ID:
#   1. Upload the file to Google Drive.
#   2. Right-click → "Share" → "Anyone with the link" → copy the link.
#   3. The ID is the long string between /d/ and /view in the URL:
#      https://drive.google.com/file/d/<FILE_ID>/view
#
# HOW TO GET A FOLDER ID:
#   Open the folder in Drive; the ID is the last path segment in the URL:
#      https://drive.google.com/drive/folders/<FOLDER_ID>
#
# Run:  python scripts/sync_data_from_drive.py        (download all)
#       python scripts/sync_data_from_drive.py --force (re-download even if present)

