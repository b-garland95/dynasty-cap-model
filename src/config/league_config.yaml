league:
  teams: 10
  scoring:
    half_ppr: true

player_positions: ["QB", "RB", "WR", "TE"]

lineup:
  qb: 1
  rb: 2
  wr: 3
  te: 1
  flex: 2           # RB/WR/TE
  superflex: 1      # QB/RB/WR/TE

roster:
  bench: 8
  ir_slots: 3
  practice_squad_slots: 10

cap:
  base_cap: 300
  annual_inflation: 0.10
  discount_rate: 0.25

valuation:
  shrinkage_lambdas:
    QB: 0.55
    RB: 0.45
    WR: 0.45
    TE: 0.60
    FLEX: 0.40
    SF: 0.50

capture_model:
  tau_by_slot:
    QB: 2.0
    RB: 2.5
    WR: 3.0
    TE: 2.5
    FLEX: 3.0
    SF: 2.5
  roster_model:
    active_roster_spots_per_team: 18
    kappa: 1.5
    gamma: 0.03
    salary_beta: 0.75
    cap_scale: 300
    stickiness_bonus: 0.15
  practice_squad_model:
    enabled: true
    cap_percent: 0.25
    rookie_draft_only: true
    assume_rookies_ps_eligible: true
    delta: 0.5
    kappa_ps: 1.5
  tau_margin_scaling: 0.3  # α: scales τ down as |margin| grows → steeper sigmoid for obvious decisions

practice_squad:
  cap_percent: 0.25
  salary_growth_while_ps: 0.0
  drop_penalty:
    current_year_percent: 0.25
    future_year_percent: 0.0
  eligibility:
    rookie_draft_only: true
    loses_eligibility_if_started: true

injured_reserve:
  cap_percent: 0.75
  eligible_statuses: ["IR","PUP","Out","Doubtful","Covid","NFI","NFI-Illness"]

dead_money:
  active_roster_cut:
    current_year_percent: 1.0
    future_year_percent: 0.25

season:
  regular_weeks: [1,14]
  playoff_weeks: [15,17]

rookie_scale:
  round1:
    "1.01": 14
    "1.02": 12
    "1.03": 12
    "1.04": 10
    "1.05": 10
    "1.06": 10
    "1.07": 8
    "1.08": 8
    "1.09": 8
    "1.10": 6
  round2_salary: 4
  round3_salary: 2
  round4_salary: 1
  contract_years: 3
  option_years: 1
  option_use_it_or_lose_it: true
  options_per_team_per_year: 1

# Age-curve parameters for dynasty multi-year projections (Hybrid A+B model).
# peak_age    – age at which a player at their expected dynasty ceiling produces
#               the highest ESV; multiplier = 1.0 exactly at this age.
# rise_slope  – exponential rate at which ESV rises toward the ceiling
#               (per year before peak).  Higher → steeper pre-peak ramp.
# decline_slope – exponential decay rate past peak (per year).
#                 Higher → steeper post-peak decline.
age_curves:
  QB:
    peak_age: 29
    rise_slope: 0.04
    decline_slope: 0.06
  WR:
    peak_age: 27
    rise_slope: 0.07
    decline_slope: 0.08
  RB:
    peak_age: 25
    rise_slope: 0.09
    decline_slope: 0.12
  TE:
    peak_age: 27
    rise_slope: 0.05
    decline_slope: 0.07

# Scaling factor for the delta-rank trajectory correction in multi-year TV paths.
# delta = redraft_positional_rank - dynasty_positional_rank (positive = developing).
# Correction at year offset k = 1 + dynasty_delta_alpha * clamp(delta / N_pos, -1, 1) * k
dynasty_delta_alpha: 0.05

# Year-over-year band expansion rate for future-year uncertainty.
# Band width at year k = base_band_width * (1 + dynasty_band_expansion * k)
dynasty_band_expansion: 0.40

phase2_variants:
  baseline:
    extra_features: []
    stage2_alpha: 1.0
  v1_rookie_xp:
    extra_features: ["is_rookie", "years_of_experience"]
    stage2_alpha: 1.0
  v2_all_demo:
    extra_features: ["is_rookie", "years_of_experience", "age"]
    stage2_alpha: 1.0
  v3_age_only:
    extra_features: ["age"]
    stage2_alpha: 1.0
  v4_rookie_only:
    extra_features: ["is_rookie"]
    stage2_alpha: 1.0
